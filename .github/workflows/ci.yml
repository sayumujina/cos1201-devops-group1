name: CI Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: mydb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: example
        ports:
          - 5432:5432
        options: 
          --health-cmd="pg_isready -U postgres" 
          --health-interval=10s 
          --health-timeout=5s 
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js  
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci 

      - name: Run tests
        run: docker-compose exec backend npm test
        env:
          DB_HOST: postgres
          DB_PORT: 5432
          DB_NAME: mydb
          DB_USER: postgres
          DB_PASSWORD: example
        
      - name: Build Docker images
        run: docker-compose build

      - name: Run Docker Compose
        run: docker-compose push sayumujina/backend
        run: docker-compose push sayumujina/frontend